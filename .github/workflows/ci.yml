name: E-Commerce Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './Backend_1/package-lock.json'

    # Note: We run these inside Backend_1 since it's the backend subproject
    - name: Install dependencies
      run: |
        cd Backend_1
        npm ci

    - name: Run TypeScript Linter Check
      run: |
        cd Backend_1
        npm run lint

    - name: Run Jest Tests
      run: |
        cd Backend_1
        npm run test

    - name: Verify Production Compilation
      run: |
        cd Backend_1
        npm run build
