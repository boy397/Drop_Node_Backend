version: '3.8'

services:
  # 1. MongoDB Database Container
  mongo:
    image: mongo:6.0
    container_name: ecommerce_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always
    mem_limit: 512m

  # 2. Redis Cache & Event Bus Container
  redis:
    image: redis:7.0-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    mem_limit: 256m

  # 3. Central API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: ecommerce_api_gateway
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - AUTH_SERVICE_URL=http://auth-service:5001
      - CATALOG_SERVICE_URL=http://catalog-service:5002
      - CART_SERVICE_URL=http://cart-service:5003
      - ORDER_SERVICE_URL=http://order-service:5004
      - NOTIFICATION_SERVICE_URL=http://notification-service:5005
      - CONTENT_SERVICE_URL=http://content-service:5006
      - NODE_OPTIONS=--max-old-space-size=96
    depends_on:
      - auth-service
      - catalog-service
      - cart-service
      - order-service
      - notification-service
      - content-service
    restart: always
    mem_limit: 128m

  # 4. Auth & User Microservice (Port 5001)
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: ecommerce_auth_service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/ecommerce_auth
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=production_docker_access_secret_key_change_me_immediately
      - JWT_REFRESH_SECRET=production_docker_refresh_secret_key_change_me_immediately
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - EMAIL_HOST=smtp.mailtrap.io
      - EMAIL_PORT=2525
      - EMAIL_FROM=noreply@ecommerce.com
      - CLIENT_URL=http://api-gateway:5000
      - NODE_OPTIONS=--max-old-space-size=128
    depends_on:
      - mongo
      - redis
    restart: always
    mem_limit: 192m

  # 5. Catalog & Product Microservice (Port 5002)
  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: ecommerce_catalog_service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/ecommerce_catalog
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://api-gateway:5000
      - NODE_OPTIONS=--max-old-space-size=128
    depends_on:
      - mongo
      - redis
    restart: always
    mem_limit: 192m

  # 6. Cart & Wishlist Microservice (Port 5003)
  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    container_name: ecommerce_cart_service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/ecommerce_cart
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379
      - CATALOG_SERVICE_URL=http://catalog-service:5002
      - CLIENT_URL=http://api-gateway:5000
      - NODE_OPTIONS=--max-old-space-size=128
    depends_on:
      - mongo
      - redis
      - catalog-service
    restart: always
    mem_limit: 192m

  # 7. Order & Checkout Microservice (Port 5004)
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: ecommerce_order_service
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/ecommerce_orders
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379
      - CART_SERVICE_URL=http://cart-service:5003
      - CATALOG_SERVICE_URL=http://catalog-service:5002
      - CLIENT_URL=http://api-gateway:5000
      - NODE_OPTIONS=--max-old-space-size=128
    depends_on:
      - mongo
      - redis
      - catalog-service
      - cart-service
    restart: always
    mem_limit: 192m

  # 8. Notification Microservice & Worker (Port 5005)
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: ecommerce_notification_service
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/ecommerce_notifications
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://api-gateway:5000
      - NODE_OPTIONS=--max-old-space-size=128
    depends_on:
      - mongo
      - redis
    restart: always
    mem_limit: 192m

  # 9. Content & CMS Microservice (Port 5006)
  content-service:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    container_name: ecommerce_content_service
    ports:
      - "5006:5006"
    environment:
      - PORT=5006
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/ecommerce_content
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://api-gateway:5000
      - NODE_OPTIONS=--max-old-space-size=128
    depends_on:
      - mongo
      - redis
    restart: always
    mem_limit: 192m

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local
